<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Curling Online</title>

<script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>

<style>
body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

canvas{
background:#3c1e12;
border-radius:20px;
margin-top:10px;
touch-action:none;
}

button,input{
height:40px;
font-size:16px;
border-radius:10px;
border:none;
margin:5px;
padding:0 10px;
}

#ui{
padding:10px;
}

</style>
</head>

<body>

<div id="ui">

<h2>Mini Curling</h2>

<button onclick="createRoom()">방 만들기</button>

<input id="roomInput" placeholder="방 코드">

<button onclick="joinRoom()">참가</button>

<button onclick="startGame()">Start Match</button>

<div id="status">LOCAL MODE</div>

</div>

<canvas id="game" width="720" height="960"></canvas>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let stones=[]
let turn="blue"

let peer=null
let conn=null
let isHost=false
let roomCode=""

const CENTER_X=360
const CENTER_Y=480

const rings=[120,80,40]

const stoneR=22

const sound=new Audio("curling_sound.mp3")

function createStones(){

stones=[]

for(let i=0;i<4;i++){
stones.push({team:"blue",x:260+i*60,y:860,vx:0,vy:0})
}

for(let i=0;i<4;i++){
stones.push({team:"orange",x:260+i*60,y:100,vx:0,vy:0})
}

}

createStones()

function draw(){

ctx.clearRect(0,0,720,960)

ctx.fillStyle="#3c1e12"
ctx.fillRect(0,0,720,960)

ctx.fillStyle="rgba(255,200,0,0.2)"
ctx.beginPath()
ctx.arc(CENTER_X,CENTER_Y,rings[0],0,Math.PI*2)
ctx.fill()

ctx.fillStyle="rgba(0,150,255,0.2)"
ctx.beginPath()
ctx.arc(CENTER_X,CENTER_Y,rings[1],0,Math.PI*2)
ctx.fill()

ctx.fillStyle="rgba(255,0,0,0.2)"
ctx.beginPath()
ctx.arc(CENTER_X,CENTER_Y,rings[2],0,Math.PI*2)
ctx.fill()

stones.forEach(s=>{

ctx.beginPath()
ctx.arc(s.x,s.y,stoneR,0,Math.PI*2)
ctx.fillStyle=s.team=="blue"?"#2563eb":"#f59e0b"
ctx.fill()

})

}

function update(){

stones.forEach(s=>{
s.x+=s.vx
s.y+=s.vy

s.vx*=0.99
s.vy*=0.99

})

detectCollisions()

draw()

requestAnimationFrame(update)

}

function detectCollisions(){

for(let i=0;i<stones.length;i++){
for(let j=i+1;j<stones.length;j++){

let a=stones[i]
let b=stones[j]

let dx=b.x-a.x
let dy=b.y-a.y

let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<stoneR*2){

sound.currentTime=0
sound.play()

}

}
}

}

let drag=null

canvas.addEventListener("pointerdown",e=>{

let rect=canvas.getBoundingClientRect()

let x=(e.clientX-rect.left)*(720/rect.width)
let y=(e.clientY-rect.top)*(960/rect.height)

stones.forEach(s=>{

if(s.team==turn){

let dx=s.x-x
let dy=s.y-y

if(Math.sqrt(dx*dx+dy*dy)<stoneR){

drag={stone:s,startX:x,startY:y}

}

}

})

})

canvas.addEventListener("pointermove",e=>{

if(!drag)return

let rect=canvas.getBoundingClientRect()

drag.x=(e.clientX-rect.left)*(720/rect.width)
drag.y=(e.clientY-rect.top)*(960/rect.height)

})

canvas.addEventListener("pointerup",e=>{

if(!drag)return

let dx=drag.startX-drag.x
let dy=drag.startY-drag.y

drag.stone.vx=dx*0.05
drag.stone.vy=dy*0.05

drag=null

turn=turn=="blue"?"orange":"blue"

})

function randomCode(){
return Math.random().toString(36).substring(2,7).toUpperCase()
}

function createRoom(){

roomCode=randomCode()

peer=new Peer("curl-"+roomCode)

isHost=true

document.getElementById("status").innerText="ROOM "+roomCode

peer.on("connection",c=>{
conn=c
document.getElementById("status").innerText="PLAYER CONNECTED"
})

}

function joinRoom(){

roomCode=document.getElementById("roomInput").value

peer=new Peer()

peer.on("open",()=>{

conn=peer.connect("curl-"+roomCode)

document.getElementById("status").innerText="JOINED "+roomCode

})

}

function startGame(){

createStones()

turn="blue"

}

update()

</script>

</body>
</html>
